<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  
  <script src="[https://cdn.tailwindcss.com](https://cdn.tailwindcss.com)"></script>
  <link href="[https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@200;400;600;900&family=Space+Grotesk:wght@400;700&display=swap](https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@200;400;600;900&family=Space+Grotesk:wght@400;700&display=swap)" rel="stylesheet">
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            serif: ['"Noto Serif KR"', 'serif'],
            sans:  ['"Space Grotesk"', 'sans-serif'],
          },
          colors: {
            ink: '#000000',
            paper: '#ffffff',
            'paper-dark': '#f4f4f0',
            muted: '#666666',
            'neo-mint': '#a7f3d0',
            'neo-pink': '#fbcfe8',
            'neo-yellow': '#fde047',
          },
          boxShadow: {
            neo: '4px 4px 0px 0px rgba(0,0,0,1)',
            'neo-lg': '8px 8px 0px 0px rgba(0,0,0,1)',
            'neo-sm': '2px 2px 0px 0px rgba(0,0,0,1)',
          }
        }
      }
    }
  </script>
  <style>
    body { background-color: #fcfaf5; color: #000; overflow-x: hidden; }
    ::selection { background: #fde047; color: #000; }
  </style>
</head>
<body class="font-serif">
  <!-- 이곳에 개별 페이지의 내용이 자동으로 채워집니다 -->
  {{ content }}
</body>
</html>
