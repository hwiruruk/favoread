<!DOCTYPE html>
<html>
<head>
<base target="_top">
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; padding: 16px; color: #222; line-height: 1.5; }
  h2 { margin: 0 0 8px; font-size: 18px; }
  h3 { margin: 24px 0 8px; font-size: 14px; border-bottom: 2px solid #000; padding-bottom: 4px; }
  .summary { background: #f8f8f5; border: 2px solid #000; box-shadow: 3px 3px 0 0 #000; padding: 12px 14px; font-size: 13px; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 8px; }
  th, td { border: 1px solid #ccc; padding: 6px 8px; text-align: left; }
  th { background: #fde047; font-weight: 700; }
  .bar { display: inline-block; height: 8px; background: #000; vertical-align: middle; margin-right: 4px; }
  .bar-bg { display: inline-block; width: 80px; height: 8px; background: #eee; border: 1px solid #999; vertical-align: middle; margin-right: 6px; }
  .bar-bg .bar { height: 100%; background: #22c55e; }
  .req { background: #fee2e2; }
  .pending { color: #d97706; font-weight: 600; }
  .empty-cnt { color: #dc2626; font-weight: 600; }
  .filled-cnt { color: #16a34a; font-weight: 600; }
  .small { font-size: 11px; color: #666; }
</style>
</head>
<body>
<? if (data.error) { ?>
  <h2>⚠️ <?= data.error ?></h2>
<? } else { ?>

<div class="summary">
  <strong>시트:</strong> <?= data.sheetName ?> · <strong>총 행:</strong> <?= data.totalRows ?>개<br>
  <strong>Critical 미입력 행:</strong> <span class="empty-cnt"><?= data.criticalCount ?>개</span>
  <span class="small">(필수 컬럼 중 빈 칸이 있는 행)</span>
</div>

<h3>컬럼별 채움 상태</h3>
<table>
  <thead>
    <tr><th>컬럼</th><th>채움</th><th>?검수대기</th><th>비어있음</th><th>%</th><th>채움률</th></tr>
  </thead>
  <tbody>
    <? data.stats.forEach(function(s) { ?>
      <tr class="<?= s.required ? 'req' : '' ?>">
        <td><?= s.col ?><?= s.required ? ' <span class="small">*</span>' : '' ?></td>
        <td class="filled-cnt"><?= s.filled ?></td>
        <td class="pending"><?= s.pending ?></td>
        <td class="empty-cnt"><?= s.empty ?></td>
        <td><?= s.pct ?>%</td>
        <td>
          <span class="bar-bg"><span class="bar" style="width: <?= s.pct ?>%"></span></span>
        </td>
      </tr>
    <? }); ?>
  </tbody>
</table>
<p class="small">* 표시 = 필수 컬럼 (분홍색 배경) · ?접두사 = 자동 제안값 (검수 필요)</p>

<? if (data.criticalCount > 0) { ?>
  <h3>⚠️ 필수 컬럼 누락 행 (<?= data.criticalCount ?>개)</h3>
  <table>
    <thead>
      <tr><th>행</th><th>연예인</th><th>도서명</th><th>누락 컬럼</th></tr>
    </thead>
    <tbody>
      <? data.criticalRows.slice(0, 50).forEach(function(r) { ?>
        <tr>
          <td><?= r.rowNum ?></td>
          <td><?= r.celeb ?></td>
          <td><?= r.book ?></td>
          <td class="empty-cnt"><?= r.missing ?></td>
        </tr>
      <? }); ?>
    </tbody>
  </table>
  <? if (data.criticalCount > 50) { ?>
    <p class="small">… 그 외 <?= data.criticalCount - 50 ?>개 행 더 있음</p>
  <? } ?>
<? } else { ?>
  <h3>✅ 필수 컬럼 모두 채워짐</h3>
<? } ?>

<? } ?>
</body>
</html>
